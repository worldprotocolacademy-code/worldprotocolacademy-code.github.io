<!DOCTYPE html>

<head>

  <style>
    :root{--navy:#0d1f3c;--navy2:#162947;--gold:#c9a84c;--cream:#f8f4ee;--white:#fff;--text:#1a1a2e;--muted:#5a6677;--line:#d8cdb8;--max:1180px;--shadow:0 12px 42px rgba(13,31,60,.12);--r:18px}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--cream);color:var(--text);line-height:1.65}a{text-decoration:none;color:inherit}.container{width:min(var(--max),calc(100% - 32px));margin:0 auto}.topbar{background:var(--navy);color:rgba(255,255,255,.86);font-size:13px;padding:10px 0}.topbar strong{color:#f1d992}.topbar-inner{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}.header{position:sticky;top:0;z-index:50;background:rgba(248,244,238,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}.nav{display:flex;align-items:center;justify-content:space-between;gap:24px;padding:14px 0}.brand{display:flex;align-items:center;gap:12px}.brand img{width:52px;height:52px;object-fit:contain;background:#fff;border-radius:14px;padding:6px;box-shadow:var(--shadow)}.brand h1{font-size:19px;line-height:1;margin:0;color:var(--navy)}.brand p{margin:5px 0 0;color:var(--muted);font-size:12px}.links{display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:flex-end}.links a{font-size:13px;font-weight:700;color:var(--navy)}.links a:hover{color:#8f6f29}.lang{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;color:var(--navy);font-weight:800}.hero{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:84px 0 70px;position:relative;overflow:hidden}.hero:before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.08) 1px,transparent 1px);background-size:72px 72px}.hero-grid{position:relative;display:grid;grid-template-columns:1.25fr .75fr;gap:42px;align-items:center}.eyebrow{display:inline-flex;border:1px solid rgba(201,168,76,.35);border-radius:999px;padding:7px 14px;color:#f1d992;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:18px}.hero h2{font-family:Georgia,"Times New Roman",serif;font-size:clamp(38px,5vw,66px);line-height:1.04;margin:0 0 18px}.hero p{font-size:18px;color:rgba(255,255,255,.82);max-width:760px;margin:0}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:28px}.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:13px 20px;font-weight:900;font-size:13px;letter-spacing:.2px}.btn-gold{background:var(--gold);color:var(--navy)}.btn-light{border:1px solid rgba(255,255,255,.28);color:#fff}.metric-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:var(--r);padding:24px}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.stat{padding:16px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}.stat b{font-size:30px;color:#f1d992;display:block}.stat span{font-size:12px;color:rgba(255,255,255,.76);font-weight:800;text-transform:uppercase}section{padding:74px 0}.section-head{max-width:850px;margin-bottom:28px}.label{display:inline-block;color:#8f6f29;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}.section-head h3{font-family:Georgia,"Times New Roman",serif;color:var(--navy);font-size:clamp(28px,3vw,42px);line-height:1.1;margin:0 0 12px}.section-head p{color:var(--muted);font-size:17px;margin:0}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:24px;box-shadow:var(--shadow);height:100%}.card h4{margin:0 0 10px;color:var(--navy);font-size:20px}.card p{margin:0;color:var(--muted);font-size:14px}.card ul{margin:14px 0 0;padding-left:18px;color:var(--muted);font-size:14px}.accent{background:#f1eadc;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}.cta{background:linear-gradient(135deg,var(--navy),#223a61);color:#fff;border-radius:24px;padding:34px;box-shadow:var(--shadow)}.cta h3{font-family:Georgia,"Times New Roman",serif;margin:0 0 10px;font-size:34px}.cta p{margin:0;color:rgba(255,255,255,.8);max-width:850px}.footer{background:#071226;color:rgba(255,255,255,.72);padding:44px 0}.footer-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:26px}.footer h4{color:#fff;margin:0 0 10px}.footer a,.footer p{font-size:14px;color:rgba(255,255,255,.72)}.footer ul{list-style:none;margin:0;padding:0;display:grid;gap:8px}@media(max-width:900px){.hero-grid,.grid-3,.grid-4,.footer-grid{grid-template-columns:1fr}.links{justify-content:flex-start}.nav{align-items:flex-start;flex-direction:column}.stats{grid-template-columns:1fr}}

</head>
<body data-page="index">
