<!doctype html>
<html lang="mk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title data-mk="WPA аудио-медиумски мотор · World Protocol Academy" data-en="WPA Audio Media Engine · World Protocol Academy">WPA аудио-медиумски мотор · World Protocol Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@500;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#0d1f3c;--gold:#c9a84c;--cream:#f5f0e0;}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;
background:radial-gradient(circle at 50% -10%,#163058,#0d1f3c 72%);
color:var(--cream);font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;padding:28px}
.card{max-width:580px;text-align:center}
.wm{font-family:'EB Garamond',Georgia,serif;letter-spacing:.2em;font-size:12px;color:var(--gold);text-transform:uppercase;margin-bottom:30px}
h1{font-family:'EB Garamond',Georgia,serif;font-weight:600;font-size:32px;color:#fff;margin-bottom:8px;line-height:1.15}
.sub{color:var(--gold);font-size:12px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:26px}
.rule{width:60px;height:2px;background:var(--gold);margin:0 auto 26px}
p.msg{font-size:16px;line-height:1.65;color:#cfd5e0;margin-bottom:34px}
.toggle{display:inline-flex;border:1px solid rgba(201,168,76,.45);border-radius:5px;overflow:hidden;margin-bottom:26px}
.toggle button{background:transparent;color:var(--cream);border:0;padding:7px 18px;font-size:13px;cursor:pointer;font-family:inherit}
.toggle button.on{background:var(--gold);color:var(--navy);font-weight:700}
.back{display:inline-block;color:var(--gold);text-decoration:none;font-size:14px;border-bottom:1px solid rgba(201,168,76,.4);padding-bottom:2px}
.back:hover{color:#fff}
</style>
</head>
<body>
<div class="card">
  <div class="wm">World Protocol Academy</div>
  <h1 data-mk="WPA аудио-медиумски мотор" data-en="WPA Audio Media Engine">WPA аудио-медиумски мотор</h1>
  <div class="sub" data-mk="Во подготовка" data-en="In preparation">Во подготовка</div>
  <div class="rule"></div>
  <p class="msg" data-mk="Оваа страница е во подготовка. Македонската и англиската верзија ќе бидат активирани во следната фаза." data-en="This page is in preparation. The Macedonian and English versions will be activated in the next phase.">Оваа страница е во подготовка. Македонската и англиската верзија ќе бидат активирани во следната фаза.</p>
  <div class="toggle">
    <button id="bmk" class="on" onclick="setLang('mk')">МК</button>
    <button id="ben" onclick="setLang('en')">EN</button>
  </div>
  <div><a class="back" href="index.html" data-mk="← Назад на почетна" data-en="← Back to home">← Назад на почетна</a></div>
</div>
<script>
function setLang(l){
  document.documentElement.lang=l;
  document.querySelectorAll('[data-mk]').forEach(function(n){var v=n.getAttribute('data-'+l);if(v!=null){if(n.tagName==='TITLE')document.title=v;else n.textContent=v;}});
  document.getElementById('bmk').className=l==='mk'?'on':'';
  document.getElementById('ben').className=l==='en'?'on':'';
  try{localStorage.setItem('wpa.language',l);}catch(e){}
}
(function(){var l='mk';try{var s=localStorage.getItem('wpa.language');if(s==='en'||s==='mk')l=s;}catch(e){}setLang(l);})();
</script>
</body>
</html>
