name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout код
        uses: actions/checkout@v4

      - name: Подготви dist
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist
          shopt -s nullglob

          cp .nojekyll dist/ 2>/dev/null || true
          cp -a *.html *.json *.txt *.xml *.png *.jpg *.jpeg *.webp *.pdf dist/ 2>/dev/null || true
          cp -a assets papers partnerships bibliography dist/ 2>/dev/null || true

          echo "Deployed: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > dist/version.txt

          echo "=== DIST CONTENTS ==="
          find dist -maxdepth 3 -type f | sort

      - name: Валидација
        run: |
          test -f dist/index.html
          test -f dist/papers.html
          echo "OK: index.html и papers.html постојат"

      - name: Конфигурирај GitHub Pages
        uses: actions/configure-pages@v4

      - name: Прикачи артефакт
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Деплој
        id: deployment
        uses: actions/deploy-pages@v4
