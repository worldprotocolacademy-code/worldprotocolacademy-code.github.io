name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout код
        uses: actions/checkout@v4

      - name: Подготви dist
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist
          shopt -s nullglob

          cp .nojekyll dist/ 2>/dev/null || true

          # Root public assets
          # IMPORTANT FIX: include root JavaScript files such as translator-loader-v4.js
          # and wpa-mk-proofreader-v2.js.
          cp -a *.html *.json *.txt *.xml *.png *.jpg *.jpeg *.webp *.pdf *.js *.css *.svg *.ico dist/ 2>/dev/null || true

          # Public site folders
          # IMPORTANT FIX: include locales so /locales/mk/core.json and /locales/en/core.json exist on the live site.
          cp -a assets locales scripts papers partnerships bibliography journal institute wpaws mk en data forms ai dist/ 2>/dev/null || true

          echo "Deployed: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > dist/version.txt

          echo "=== DIST CONTENTS ==="
          find dist -maxdepth 4 -type f | sort

      - name: Валидација
        run: |
          test -f dist/index.html
          test -f dist/translator-loader-v4.js
          test -f dist/wpa-mk-proofreader-v2.js
          test -f dist/locales/mk/core.json
          test -f dist/locales/en/core.json
          echo "OK: WPA Translator v4 deployment files exist"

      - name: Конфигурирај GitHub Pages
        uses: actions/configure-pages@v4

      - name: Прикачи артефакт
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Деплој
        id: deployment
        uses: actions/deploy-pages@v4
