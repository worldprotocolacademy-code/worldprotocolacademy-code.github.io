name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Podgotvi dist
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist
          shopt -s nullglob

          cp .nojekyll dist/ 2>/dev/null || true

          # Root public assets
          # IMPORTANT: include root JavaScript files such as translator-loader-v4.js
          # and wpa-mk-proofreader-v2.js.
          cp -a *.html *.json *.txt *.xml *.png *.jpg *.jpeg *.webp *.pdf *.js *.css *.svg *.ico dist/ 2>/dev/null || true

          # Public site folders
          # PHASE 2 FIX: Added student-desk, protocol-symbols, audio-media-engine,
          # multi-ai-command-center, diplomatic-analysis-lab, viral-sande-ai
          # These are required for all 6 Phase 2 modules + Student Desk to be accessible.
          cp -a assets locales scripts papers working-papers partnerships bibliography journal institute wpaws mk en data forms ai student-desk protocol-symbols audio-media-engine multi-ai-command-center diplomatic-analysis-lab viral-sande-ai dist/ 2>/dev/null || true

          echo "Deployed: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > dist/version.txt

          echo "=== DIST CONTENTS ==="
          find dist -maxdepth 4 -type f | sort

      - name: Validacija
        run: |
          test -f dist/index.html
          test -f dist/translator-loader-v4.js
          test -f dist/wpa-mk-proofreader-v2.js
          test -f dist/locales/mk/core.json
          test -f dist/locales/en/core.json
          # PHASE 2: Verify critical module folders exist in dist
          test -d dist/student-desk
          test -d dist/protocol-symbols
          test -d dist/audio-media-engine
          test -d dist/multi-ai-command-center
          test -d dist/diplomatic-analysis-lab
          test -d dist/viral-sande-ai
          echo "OK: WPA Translator v4 + Phase 2 modules deployment files exist"

      - name: Konfiguriraj GitHub Pages
        uses: actions/configure-pages@v4

      - name: Prikaci artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploj
        id: deployment
        uses: actions/deploy-pages@v4
