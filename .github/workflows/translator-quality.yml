name: WPA Translator Quality CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: wpa-translator-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  translator-quality:
    name: Validate translator system
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile translator quality script
        run: python -m py_compile scripts/translator_quality_check.py

      - name: Run translator quality checks
        run: python scripts/translator_quality_check.py
