name: WPA i18n Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  i18n-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run i18n audit
        run: |
          python scripts/wpa_i18n_audit.py --core-only

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: i18n-audit-report
          path: i18n-audit-report/
