name: WPA Watch

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - name: Generate static WPA Watch test data
        run: |
          cat > tools/wpa-watch/items.json <<'EOF'
          [
            {
              "id": "wpa-watch-live-001",
              "title": "WPA Watch Engine Active",
              "source": "WPA Watch",
              "domain": "academic",
              "summary": "The WPA Watch workflow is active. RSS harvesting will be expanded after stable validation.",
              "link": "https://worldprotocolacademy-code.github.io/tools/wpa-watch/"
            }
          ]
          EOF

          cat > tools/wpa-watch/status.json <<'EOF'
          {
            "status": "active",
            "generated": "manual-run",
            "items_total": 1,
            "sources_live": 1,
            "sources_total": 1
          }
          EOF

      - name: Commit outputs
        run: |
          git config user.name "wpa-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add tools/wpa-watch/items.json tools/wpa-watch/status.json
          git commit -m "Activate WPA Watch test data" || echo "No changes"
          git push
