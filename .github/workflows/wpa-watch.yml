name: WPA Watch

on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: wpa-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 7

    defaults:
      run:
        working-directory: tools/wpa-watch

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate WPA Watch feed
        run: npm run watch

      - name: Report
        run: npm run report

      - name: Commit outputs
        run: |
          cd ../..
          git config user.name "wpa-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add tools/wpa-watch/items.json tools/wpa-watch/status.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "WPA Watch update $(date -u +%FT%TZ)"
            git pull --rebase origin main
            git push origin main
          fi
